stages:
  - build
  - test
  - deploy

# 1. Сборка (как и была)
build-images:
  stage: build
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/backend:latest ./backend
    - docker build -t $CI_REGISTRY_IMAGE/frontend:latest ./frontend
    - docker push $CI_REGISTRY_IMAGE/backend:latest
    - docker push $CI_REGISTRY_IMAGE/frontend:latest

# 2. ТЕСТЫ: Запускаем их ВНУТРИ временных контейнеров
test-backend:
  stage: test
  script:
    # Мы поднимаем временный контейнер python, прокидываем туда код и запускаем pytest
    - docker run --rm -v $(pwd)/backend:/app -w /app python:3.10-slim sh -c "pip install -r requirements.txt && pytest"

test-frontend:
  stage: test
  script:
    # Аналогично для фронта
    - docker run --rm -v $(pwd)/frontend:/app -w /app node:18-alpine sh -c "npm install && npm test"

# 3. ДЕПЛОЙ (выполнится только если тесты прошли)
deploy-job:
  stage: deploy
  only:
    - main
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker compose pull
    - docker compose up -d
    - docker image prune -f

