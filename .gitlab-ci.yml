stages:
  - test
  - build
  - deploy

# ===============================
# ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
# ===============================
variables:
  CI_REGISTRY: "192.168.0.147:5050"
  CI_REGISTRY_IMAGE_BACKEND: "$CI_REGISTRY/$CI_PROJECT_NAME/backend"
  CI_REGISTRY_IMAGE_FRONTEND: "$CI_REGISTRY/$CI_PROJECT_NAME/frontend"

  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

cache:
  paths:
    - backend/__pycache__/
    - frontend/node_modules/

# ===============================
# ОБЩИЙ ШАБЛОН DOCKER JOB
# ===============================
.docker-build-template:
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker info
    - echo "$MY_REGISTRY_TOKEN" | docker login $CI_REGISTRY -u git --password-stdin

# ===============================
# ТЕСТЫ BACKEND
# ===============================
test-backend:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install flake8 pytest
    - pip install -r backend/requirements.txt
  script:
    - flake8 backend/ --max-line-length=120
    - cd backend && python -m pytest || echo "✅ Нет тестов — пропускаем"
  only:
    - main
    - merge_requests

# ===============================
# ТЕСТЫ FRONTEND
# ===============================
test-frontend:
  stage: test
  image: node:18-alpine
  script:
    - cd frontend
    - npm install
    - npm run lint || echo "✅ Нет линтера — пропускаем"
  only:
    - main
    - merge_requests

# ===============================
# СБОРКА BACKEND
# ===============================
build-backend:
  stage: build
  extends: .docker-build-template
  script:
    - docker build -t $CI_REGISTRY_IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA ./backend
    - docker tag $CI_REGISTRY_IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE_BACKEND:latest
    - docker push $CI_REGISTRY_IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE_BACKEND:latest
  only:
    - main

# ===============================
# СБОРКА FRONTEND
# ===============================
build-frontend:
  stage: build
  extends: .docker-build-template
  script:
    - docker build -t $CI_REGISTRY_IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA ./frontend
    - docker tag $CI_REGISTRY_IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE_FRONTEND:latest
    - docker push $CI_REGISTRY_IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE_FRONTEND:latest
  only:
    - main

# ===============================
# ДЕПЛОЙ НА PROD
# ===============================
deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client docker-cli-compose
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - chmod 600 ~/.ssh/known_hosts
  script:
    - scp docker-compose.yml $SSH_USER@$PROD_SERVER:/home/$SSH_USER/project/
    - scp -r nginx/ $SSH_USER@$PROD_SERVER:/home/$SSH_USER/project/
    - scp -r apache/ $SSH_USER@$PROD_SERVER:/home/$SSH_USER/project/
    - scp -r monitoring/ $SSH_USER@$PROD_SERVER:/home/$SSH_USER/project/

    - |
      ssh $SSH_USER@$PROD_SERVER "
        cd /home/$SSH_USER/project &&
        echo '$MY_REGISTRY_TOKEN' | docker login $CI_REGISTRY -u git --password-stdin &&
        docker compose down &&
        docker compose pull &&
        docker compose up -d &&
        docker system prune -f
      "
  only:
    - main
  environment:
    name: production
    url: http://$PROD_SERVER