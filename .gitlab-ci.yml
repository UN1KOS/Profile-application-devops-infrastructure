stages:
  - build
  - test
  - deploy



variables:
  CI_REGISTRY: "192.168.0.147:5050"
  CI_REGISTRY_IMAGE_BACKEND: "$CI_REGISTRY/$CI_PROJECT_NAME/backend"
  CI_REGISTRY_IMAGE_FRONTEND: "$CI_REGISTRY/$CI_PROJECT_NAME/frontend"

  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375
  DOCKER_DRIVER: overlay2

cache:
  paths:
    - backend/__pycache__/
    - frontend/node_modules/


test-backend:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install flake8 pytest
    - pip install -r backend/requirements.txt
  script:
    - flake8 backend/ --max-line-length=120
    - cd backend && python -m pytest || echo "✅ Нет тестов - пропускаем"
  only:
    - main
    - merge_requests


test_frontend:
  stage: test
  image: node:18-alpine
  script:
    - cd frontend
    - npm install
    - npm run lint || echo "✅ Нет линтера - пропускаем"
  only:
    - main
    - merge_requests


build-backend:
  stage: build
  image: docker:24.0.5-cli
  services:
    - name: docker:24.0.5-dind
    - command: ["--insecure-registry=192.168.0.147:5050"]
  before_script:
    - echo "$CI_JOB_TOKEN" | docker login $CI_REGISTRY -u git --password-stdin
  script:
    - docker build -t $CI_REGISTRY_IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA ./backend
    - docker tag $CI_REGISTRY_IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE_BACKEND:latest
    - docker push $CI_REGISTRY_IMAGE_BACKEND:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE_BACKEND:latest
  only:
    - main

build-frontend:
  stage: build
  image: docker:24.0.5-cli
  services:
    - name: docker:24.0.5-dind
      command: ["--insecure-registry=192.168.0.147:5050"]
  before_script:
    - echo "$CI_JOB_TOKEN" | docker login $CI_REGISTRY -u git --password-stdin
  script:
    - docker build -t $CI_REGISTRY_IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA ./frontend
    - docker tag $CI_REGISTRY_IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA $CI_REGISTRY_IMAGE_FRONTEND:latest
    - docker push $CI_REGISTRY_IMAGE_FRONTEND:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE_FRONTEND:latest
  only:
    - main

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client docker-compose
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
    - echo "Host $PROD_SERVER" >> ~/.ssh/config
    - echo "  Port $SSH_PORT" >> ~/.ssh/config
    - echo "  User $SSH_USER" >> ~/.ssh/config
    - chmod 600 ~/.ssh/config
  script:
    - scp docker-compose.yml $SSH_USER@$PROD_SERVER:/home/$SSH_USER/project/
    - scp -r nginx/ $SSH_USER@$PROD_SERVER:/home/$SSH_USER/project/
    - scp -r apache/ $SSH_USER@$PROD_SERVER:/home/$SSH_USER/project/
    
    # На сервере: обновляем и перезапускаем
    - ssh $SSH_USER@$PROD_SERVER "
    - cd /home/$SSH_USER/project &&
        
        # Логинимся в registry
    - echo '$CI_JOB_TOKEN' | docker login $CI_REGISTRY -u git --password-stdin &&
        
        # Останавливаем старые контейнеры
    - docker-compose down &&
        
        # Обновляем образы
    - docker-compose pull &&
        
        # Запускаем заново
    - docker-compose up -d &&
        
        # Чистим старые образы
    - docker system prune -f
      "
  only:
    - main
  environment:
    name: production
    url: http://$PROD_SERVER

    
